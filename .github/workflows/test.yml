name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run ruff linting
        run: ruff check .

      - name: Run ruff format check
        run: ruff format --check .

      - name: Run pytest
        run: pytest tests/ -v --tb=short --cov=. --cov-report=term-missing
        env:
          FLASK_SECRET_KEY: test-secret-key
          CLEAR_CACHE_ON_START: "false"

  gourmand:
    name: Code Quality (Gourmand)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/
            ~/.cargo/git/
          key: ${{ runner.os }}-cargo-gourmand-${{ hashFiles('gourmand.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-gourmand-

      - name: Install Gourmand
        run: |
          if ! command -v gourmand &> /dev/null; then
            cargo install --git https://codeberg.org/mattdm/gourmand.git
          fi

      - name: Run Gourmand
        run: gourmand --full .

  javascript-tests:
    name: JavaScript Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer
        run: npm install puppeteer

      - name: Run JavaScript tests
        run: |
          node << 'EOF'
          const puppeteer = require('puppeteer');
          const path = require('path');
          const fs = require('fs');

          (async () => {
            const browser = await puppeteer.launch({
              headless: 'new',
              args: ['--no-sandbox', '--disable-setuid-sandbox']
            });
            const page = await browser.newPage();

            // Enable console logging
            page.on('console', msg => console.log('Browser:', msg.text()));
            page.on('pageerror', err => console.error('Page error:', err.message));

            // Load the test page
            const testFile = path.resolve('tests/js/test_utils.html');
            console.log('Loading test file:', testFile);

            await page.goto('file://' + testFile, { waitUntil: 'networkidle0' });

            // Wait for tests to complete (check for data attribute)
            await page.waitForFunction(() => {
              return document.body.hasAttribute('data-test-exit-code');
            }, { timeout: 30000 });

            // Get results
            const results = await page.evaluate(() => ({
              exitCode: document.body.getAttribute('data-test-exit-code'),
              passed: document.body.getAttribute('data-test-passed'),
              failed: document.body.getAttribute('data-test-failed')
            }));

            console.log(`\nTest Results: ${results.passed} passed, ${results.failed} failed`);

            await browser.close();

            // Exit with appropriate code
            process.exit(parseInt(results.exitCode));
          })();
          EOF
